apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: lobster-k8s-copilot
  labels:
    app: backend
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: lobster-backend-sa
      containers:
        - name: backend
          image: lobster-k8s-copilot/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: lobster-config
            - secretRef:
                name: lobster-secrets
          volumeMounts:
            - name: lobster-db
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: lobster-db
          persistentVolumeClaim:
            claimName: lobster-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: lobster-k8s-copilot
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
---
# ServiceAccount for backend to access K8s API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lobster-backend-sa
  namespace: lobster-k8s-copilot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lobster-backend-role
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lobster-backend-rolebinding
subjects:
  - kind: ServiceAccount
    name: lobster-backend-sa
    namespace: lobster-k8s-copilot
roleRef:
  kind: ClusterRole
  name: lobster-backend-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lobster-db-pvc
  namespace: lobster-k8s-copilot
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
