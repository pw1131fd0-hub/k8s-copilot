apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
  namespace: lobster-k8s-copilot
  labels:
    app: ai-engine
    app.kubernetes.io/component: ai-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: ai-engine
          image: lobster-k8s-copilot/ai-engine:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
              name: http
          envFrom:
            - configMapRef:
                name: lobster-config
            - secretRef:
                name: lobster-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-engine-service
  namespace: lobster-k8s-copilot
spec:
  selector:
    app: ai-engine
  ports:
    - port: 8001
      targetPort: 8001
      name: http
  type: ClusterIP
